name: CD

on:
  push:
    branches:
      - main

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE: us-east1-docker.pkg.dev/gonzalez03t-portfolio/hermes-pipeline/app
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CI_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:sha-${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Set image output
        id: meta
        run: echo "image=${{ env.IMAGE }}:sha-${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy-dev:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CD_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: |
          gcloud run deploy hermes-pipeline-dev \
            --image=${{ needs.build-push.outputs.image }} \
            --region=us-east1 \
            --project=gonzalez03t-portfolio \
            --quiet

  promote-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Production deployment approved"

  deploy-prod:
    needs: [promote-prod, build-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.CD_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: |
          gcloud run deploy hermes-pipeline-prod \
            --image=${{ needs.build-push.outputs.image }} \
            --region=us-east1 \
            --project=gonzalez03t-portfolio \
            --quiet
